<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="icon" href="data:,">

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <link rel="stylesheet" href="css/style.css">

</head>

<body>
    <header
        class="flex flex-col md:flex-row gap-5 justify-between w-full mx-auto px-8 md:px-20 py-5 bg-white/90 shadow-[0_22px_80px_rgba(15,23,42,0.08)] backdrop-blur-sm border border-slate-200/70 mb-[60px]">
        <div class="flex gap-3 items-center flex-1">
            <span
                class="w-10 h-10 md:w-12 md:h-12 rounded-2xl bg-slate-100 flex items-center justify-center overflow-hidden shadow-sm">
                <img src="/assets/github-logo.png" alt="github-logo" class="w-full h-full object-contain" />
            </span>
            <div>

                <h1 class="text-base md:text-xl font-semibold text-slate-900">GitHub Issues Tracker</h1>
            </div>
        </div>

        <div class="search-box ">
            <div class="join space-x-2">
                <div>
                    <label
                        class="input validator join-item relative mr-2 rounded-lg focus:outline-none outline-none hover:-translate-y-0.5 hover:shadow-[]">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                            <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M21 21l-4.35-4.35M10 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16z" stroke="currentColor"
                                    stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </span>
                        <input type="text" placeholder="Search issues..." class="pl-10" id="srcBox" required />
                    </label>


                </div>
                <button class="btn btn-primary join-item text-sm md:text-lg p-[1px] md:p-[1rem]" id="srcNewIssue">+New
                    Issues</button>
            </div>


        </div>

        <span id="logOutBtn" class="btn btn-primary btn-soft rounded-lg"><i
                class="fa-solid fa-arrow-right-from-bracket fa-2x"></i><span>
    </header>

    <!-- all open closed button -->
    <section
        class="p-6 rouned-md mb-4 container mx-auto bg-white/90 shadow-[0_22px_80px_rgba(15,23,42,0.08)] backdrop-blur-sm border border-slate-200/70 flex flex-row gap-2">
        <span><button class="btn btn-primary w-[120px] h-[40px]">All</button></span>
        <span><button class="btn  w-[120px] h-[40px]">Open</button></span>
        <span><button class="btn  w-[120px] h-[40px]">Closed</button></span>

    </section>

    <!-- card section -->

    <main>
        <div
            class="card-header p-6 rouned-md border-b-2 border-solid border-gray-500  container mx-auto bg-white/90 shadow-[0_22px_80px_rgba(15,23,42,0.08)] backdrop-blur-sm border border-slate-200/70 flex flex-row gap-2 justify-between items-center">
            <div class="left flex gap-2">
                <div class="w-12 h-12 rounded-full bg-purple-200 relative"><img src="assets/Aperture.png" alt="aperture"
                        class="absolute top-1/2 -translate-y-1/2 left-2"></div>
                <div class="title">
                    <p id="total-issues" class="text-xl font-bold">0</p>
                    <p class="text-sm text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="right flex gap-4">
                <div class="open-status flex gap-2 justify-center items-center">
                    <span class="h-3 w-3 rounded-full bg-green-400 block"></span>
                    <span class="text-[16px] font-bold">Open</span>
                </div>

                <div class="closed-status flex gap-2 justify-center items-center">
                    <span class="h-3 w-3 rounded-full bg-purple-400 block"></span>
                    <span class="text-[16px] font-bold">Closed</span>
                </div>
            </div>

        </div>

        <div
            class="card-container p-6 container mx-auto bg-white/90 shadow-[0_22px_80px_rgba(15,23,42,0.08)] backdrop-blur-sm border border-slate-200/70 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

        </div>


        </div>


        </div>

    </main>

    <script src="js/dashboard.js"></script>
</body>

</html>
