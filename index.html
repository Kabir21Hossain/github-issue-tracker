<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body overflow-hidden min-h-screen">

    <!-- Aninmated backgorund grid -->
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="min-h-screen flex items-center justify-center px-4 relative z-10">
        <div class="login-card w-full max-w-md py-8 px-8 shadow-2xl space-y-6 rounded-2xl hover:translate-y-1 hover:z-500">
            <!-- logo & Title -->
            <div class="logo-wrap mx-auto mb-4">
                <img src="assets/github-logo.png" alt="github logo" class="block mx-auto">
            </div>

            <div>
                <h1 class="text-3xl font-bold tracking-tight login-title text-center">Github Issues Tracker</h1>
                <p class="login-subtitle mt-2 text-lg text-gray-400 text-center">Sign in to manage your issues</p>
            </div>

            <!-- form -->

            <div class="login-form-box">

                <!-- error alert -->
                <div id="login-error" class="alert alert-error mb-4 font-bold font-lg hidden">
                    <i class="fa-solid fa-circle-xmark"></i>
                    <span class="text-white">Invalid username or password. Please try again.</span>
                </div>

                <div class="form-group mb-4">
                    <label class="label" for="username">
                        <span class="label-text font-bold text-lg text-gray-600">Username</span>
                    </label>
                    <input id="username" type="text" placeholder="Enter your username" required
                        class="input input-bordered w-full login-input focus:border-blue-500 focus:outline-none focus:shadow-[0_35px_60px_-15px_rgba(10.3,3.4,0,0.1)] rounded-lg focus:-translate-y-1 transition-all 0.5s ease-in-out"
                        autocomplete="username" />
                    <p class="text-sm text-purple-700 font-medium">Default:admin</p>
                </div>

                <div class="form-group mb-6">
                    <label class="label" for="password">
                        <span class="label-text font-bold text-lg text-gray-600">Password</span>
                    </label>
                    <div class="relative">
                        <input id="password" type="password" placeholder="Enter your password" required
                            class="input input-bordered w-full login-input pr-12 focus:border-blue-500 focus:outline-none focus:shadow-[0_35px_60px_-15px_rgba(10.3,3.4,0,0.1)] rounded-lg focus:-translate-y-1 transition-all 0.5s ease-in-out"
                            autocomplete="current-password" />
                        <button type="button" id="togglePassword"
                            class="absolute right-3 top-1/2 -translate-y-1/2 eye-btn">
                            <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 " fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                        </button>
                    </div>
                    <p class="text-sm text-purple-700 mt-1 font-medium">Default:admin123</p>
                </div>

                <button id="loginBtn" class="btn btn-primary w-full font-semibold text-base">
                    <span id="loginBtnText">Sign In</span>
                    <span id="loginSpinner" class="loading loading-spinner loading-sm hidden"></span>
                </button>

                <hr class="border-gray-400 my-4">
                <p class="text-md font-light text-center">OR</p>

                <!-- Demo Credentials -->
                <div class="demo-creds mt-6">
                    <p class="text-md font-semibold mb-2 uppercase tracking-widest text-gray-500">Demo Credentials</p>
                    <div class="space-y-2 shadow-xl p-4 rounded-lg bg-gray-100">
                        <div class="flex items-center justify-between gap-2">
                            <span class="font-bold text-gray-700 text-[#64748b]">Username:</span>
                            <span
                                class="text-gray-600 bg-[rgba(99,102,241,0.1)] px-2 py-1 rounded-sm text-[#6366f1]">admin</span>
                        </div>
                        <div class="flex items-center justify-between gap-2">
                            <span class="font-bold text-gray-700 text-[#64748b]">Password:</span>
                            <span
                                class="text-gray-600 bg-[rgba(99,102,241,0.1)] px-2 py-1 rounded-sm text-[#6366f1]">admin123</span>
                        </div>
                    </div>

                    <button id="fillDemoBtn" class="btn btn-sm btn-soft btn-primary demo-fill-btn w-full mt-3">
                        Use Demo Credentials
                    </button>

                </div>


                </form>
            </div>

        </div>



    </div>






<script src="js/login.js"></script>
</body>

</html>
